<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YATA News Reader</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        :root {
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #212529;
            --accent-color: #007bff;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212;
                --card-bg: #1e1e1e;
                --text-color: #e0e0e0;
                --accent-color: #375a7f;
            }
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding-bottom: 3rem;
        }
        .navbar {
            background-color: var(--card-bg) !important;
            border-bottom: 1px solid rgba(128,128,128,0.2);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .navbar-brand {
            color: var(--accent-color) !important;
            font-size: 1.4rem;
            letter-spacing: -0.5px;
        }
        .navbar-brand i {
            color: var(--accent-color);
        }
        .nav-link {
            color: var(--text-color) !important;
        }
        .news-card {
            background-color: var(--card-bg);
            border: 1px solid rgba(128,128,128,0.1);
            border-radius: 12px;
            margin-bottom: 1.5rem;
            transition: transform 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .news-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }
        .card-body { padding: 1.25rem; }
        .source-badge {
            font-size: 0.75rem;
            background-color: var(--accent-color);
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            margin-bottom: 8px;
            display: inline-block;
        }
        .news-date {
            font-size: 0.8rem;
            color: gray;
            float: right;
        }
        .news-title {
            font-weight: bold;
            font-size: 1.15rem;
            margin-bottom: 0.75rem;
            line-height: 1.4;
        }
        .news-summary {
            font-size: 0.95rem;
            color: var(--text-color);
            opacity: 0.9;
            border-left: 3px solid var(--accent-color);
            padding-left: 10px;
            margin-top: 10px;
            background-color: rgba(0, 123, 255, 0.05);
            padding-top: 5px;
            padding-bottom: 5px;
        }
        .news-abstract {
            font-size: 0.85rem;
            color: gray;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        a { text-decoration: none; color: inherit; }
        .btn-yata {
            background-color: var(--accent-color);
            color: white;
            border-radius: 20px;
            padding: 5px 20px;
            font-size: 0.9rem;
        }
        #loading { text-align: center; margin-top: 100px; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">
            <i class="bi bi-robot me-2"></i>YATA Intelligence
        </a>
        <div class="d-flex">
            <button class="btn btn-outline-secondary btn-sm me-2" onclick="location.reload()">
                <i class="bi bi-arrow-clockwise"></i>
            </button>
            <a href="/map.html" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-map"></i>
            </a>
        </div>
    </div>
</nav>

<div class="container">
    <div id="loading">
        <div class="spinner-border text-primary" role="status"></div>
        <p class="mt-2">最新のニュースを読み込み中...</p>
    </div>
    
    <div id="news-container" class="row">
        <!-- ニュースがここに挿入されます -->
    </div>
</div>

<script>
    async function fetchNews() {
        try {
            const response = await fetch('/api/news');
            const data = await response.json();
            const container = document.getElementById('news-container');
            const loading = document.getElementById('loading');
            
            loading.style.display = 'none';
            
            data.forEach(item => {
                const date = new Date(item.date).toLocaleString('ja-JP', { 
                    month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' 
                });
                
                const card = `
                    <div class="col-12 col-md-6 col-xl-4">
                        <div class="news-card">
                            <div class="card-body">
                                <span class="news-date">${date}</span>
                                <span class="source-badge">${item.source || 'RSS'}</span>
                                <a href="${item.url}" target="_blank">
                                    <div class="news-title">${item.title}</div>
                                </a>
                                <div class="news-abstract">${item.abstract || ''}</div>
                                ${item.summary ? `<div class="news-summary">${item.summary}</div>` : ''}
                                <div class="mt-3 text-end">
                                    <a href="${item.url}" target="_blank" class="btn btn-yata">記事を読む <i class="bi bi-box-arrow-up-right ms-1"></i></a>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += card;
            });
        } catch (e) {
            console.error(e);
            document.getElementById('loading').innerHTML = '<p class="text-danger">読み込みに失敗しました。</p>';
        }
    }

    window.onload = fetchNews;
</script>

</body>
</html>
