<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YATA News Reader</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        :root {
            --bg-color: #f4f7f9;
            --card-bg: #ffffff;
            --text-color: #2c3e50;
            --accent-color: #007bff;
            --border-color: rgba(0,0,0,0.08);
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #1a1a1a;
                --card-bg: #242424;
                --text-color: #e0e0e0;
                --accent-color: #3498db;
                --border-color: rgba(255,255,255,0.1);
            }
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding-bottom: 5rem;
        }
        .navbar {
            background-color: var(--card-bg) !important;
            border-bottom: 1px solid var(--border-color);
            padding: 0.8rem 0;
            position: sticky; top: 0; z-index: 1000;
        }
        .navbar-brand {
            color: var(--accent-color) !important;
            font-weight: 800; font-size: 1.3rem; letter-spacing: -0.5px;
        }
        
        /* ニュースリストのスタイル */
        .news-item {
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 1.25rem;
            transition: background-color 0.2s;
            position: relative;
        }
        .news-item:first-child { border-top-left-radius: 12px; border-top-right-radius: 12px; }
        .news-item:last-child { border-bottom-left-radius: 12px; border-bottom-right-radius: 12px; border-bottom: none; }
        .news-item:hover {
            background-color: rgba(0, 123, 255, 0.02);
        }
        
        .source-tag {
            font-size: 0.7rem; font-weight: bold; text-transform: uppercase;
            color: var(--accent-color); background: rgba(0, 123, 255, 0.1);
            padding: 2px 8px; border-radius: 4px; margin-right: 8px;
        }
        .news-date { font-size: 0.8rem; color: #888; }
        .news-title {
            font-size: 1.1rem; font-weight: 700; line-height: 1.4;
            margin: 8px 0; display: block; text-decoration: none; color: inherit;
        }
        .news-title:hover { color: var(--accent-color); }
        
        .news-summary {
            font-size: 0.92rem; line-height: 1.6; opacity: 0.85;
            margin-bottom: 12px;
        }
        
        /* アクションボタン */
        .action-bar { display: flex; gap: 10px; margin-top: 10px; }
        .btn-action {
            font-size: 0.8rem; font-weight: 600; padding: 4px 12px;
            border-radius: 6px; border: 1px solid var(--border-color);
            background: transparent; color: var(--text-color);
            transition: all 0.2s;
        }
        .btn-action:hover {
            border-color: var(--accent-color); color: var(--accent-color);
            background: rgba(0, 123, 255, 0.05);
        }
        .btn-ai { border-color: #9b59b6; color: #9b59b6; }
        .btn-ai:hover { border-color: #8e44ad; color: #8e44ad; background: rgba(142, 68, 173, 0.05); }

        /* AI詳細表示エリア */
        .ai-detail-box {
            display: none; margin-top: 15px; padding: 15px;
            background: rgba(142, 68, 173, 0.05);
            border-left: 4px solid #9b59b6; border-radius: 4px;
            font-size: 0.9rem; line-height: 1.7;
        }
        .ai-detail-box.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

        .spinner-ai { width: 1rem; height: 1rem; border-width: 0.15em; display: none; margin-right: 5px; }

        #loading-overlay { text-align: center; padding: 50px; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg mb-4">
    <div class="container">
        <div class="d-flex align-items-center">
            <a href="#" onclick="if(window.parent && window.parent.showHome){window.parent.showHome();}else{window.location.href='portal.html';} return false;" class="me-3 text-decoration-none" style="font-size: 1.2rem;">🏠</a>
            <a class="navbar-brand" href="#"><i class="bi bi-robot me-2"></i>YATA Intelligence</a>
        </div>
        <div class="d-flex gap-2">
            <button class="btn btn-outline-secondary btn-sm" onclick="location.reload()"><i class="bi bi-arrow-clockwise"></i></button>
            <a href="/map.html" class="btn btn-outline-secondary btn-sm"><i class="bi bi-map"></i></a>
        </div>
    </div>
</nav>

<div class="container">
    <div id="loading-overlay">
        <div class="spinner-border text-primary" role="status"></div>
        <p class="mt-2 text-muted">最新のインテリジェンスを同期中...</p>
    </div>
    
    <div id="news-list" class="shadow-sm">
        <!-- ニュース項目がここに挿入されます -->
    </div>
</div>

<script>
    async function fetchNews() {
        try {
            const response = await fetch('/api/news');
            const data = await response.json();
            const list = document.getElementById('news-list');
            document.getElementById('loading-overlay').style.display = 'none';
            
            data.forEach((item, index) => {
                const date = new Date(item.date).toLocaleString('ja-JP', { 
                    month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' 
                });
                
                let displayTitle = item.title;
                let displaySummary = item.summary || item.abstract || '要約なし';
                let isAiGenerated = !!item.summary;

                if (isAiGenerated) {
                    const firstPeriod = item.summary.indexOf('。');
                    if (firstPeriod !== -1) {
                        displayTitle = item.summary.substring(0, firstPeriod + 1);
                        displaySummary = item.summary.substring(firstPeriod + 1).trim();
                    } else {
                        displayTitle = item.summary;
                        displaySummary = "";
                    }
                }

                const html = `
                    <div class="news-item" id="item-${index}">
                        <div class="d-flex align-items-center mb-1">
                            <span class="source-tag">${item.source || 'RSS'}</span>
                            <span class="news-date">${date}</span>
                            ${isAiGenerated ? '<span class="badge bg-info-subtle text-info-emphasis ms-2" style="font-size:0.6rem; border: 1px solid rgba(0,123,255,0.2);">AI OPTIMIZED</span>' : ''}
                        </div>
                        <a href="${item.url}" target="_blank" class="news-title">${displayTitle}</a>
                        ${displaySummary ? `<div class="news-summary">${displaySummary}</div>` : ''}
                        
                        <div class="action-bar">
                            <a href="${item.url}" target="_blank" class="btn-action">
                                <i class="bi bi-box-arrow-up-right me-1"></i>記事元
                            </a>
                            <button class="btn-action btn-ai" onclick="getAiSummary('${item.url}', ${index})">
                                <div class="spinner-border spinner-ai" id="spin-${index}" role="status"></div>
                                <i class="bi bi-stars me-1" id="icon-${index}"></i>AI詳細解析
                            </button>
                        </div>
                        
                        <div class="ai-detail-box" id="ai-box-${index}"></div>
                    </div>
                `;
                list.innerHTML += html;
            });
        } catch (e) {
            console.error(e);
            document.getElementById('loading-overlay').innerHTML = '<p class="text-danger">データの取得に失敗しました。</p>';
        }
    }

    async function getAiSummary(url, index) {
        console.log(`[JS] AI分析ボタンが押されました: ${url}`);
        const box = document.getElementById(`ai-box-${index}`);
        const spin = document.getElementById(`spin-${index}`);
        const icon = document.getElementById(`icon-${index}`);
        
        if (box.classList.contains('active')) {
            console.log("[JS] ボックスを閉じます");
            box.classList.remove('active');
            return;
        }

        // すでに取得済みなら再表示するだけ
        if (box.innerHTML.trim() !== "") {
            console.log("[JS] 既存のキャッシュを表示します");
            box.classList.add('active');
            return;
        }

        // APIリクエスト
        console.log("[JS] APIリクエストを開始します...");
        spin.style.display = 'inline-block';
        icon.style.display = 'none';

        try {
            const res = await fetch('/api/summary', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url: url })
            });
            
            console.log(`[JS] サーバーからのレスポンスを受信: Status ${res.status}`);
            
            if (!res.ok) {
                const errText = await res.text();
                console.error(`[JS] サーバーエラー: ${errText}`);
                throw new Error(`Server responded with ${res.status}: ${errText}`);
            }
            
            const text = await res.text();
            console.log(`[JS] AI Response (先頭50文字): ${text.substring(0, 50)}`);
            console.log("AI Response:", text); // ブラウザのコンソールに出力
            
            if (!text || text.trim() === "") {
                box.innerHTML = `<span class="text-warning">AIからの返答が空でした。もう一度お試しください。</span>`;
            } else {
                // 簡易Markdown変換 (太字のみ)
                const formatted = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                                     .replace(/\n/g, '<br>');
                
                box.innerHTML = `<div class="fw-bold mb-2 text-purple"><i class="bi bi-chat-left-dots me-2"></i>AI Insight:</div>${formatted}`;
            }
            box.classList.add('active');
        } catch (e) {
            box.innerHTML = `<span class="text-danger">解析エラー: ${e.message}</span>`;
            box.classList.add('active');
        } finally {
            spin.style.display = 'none';
            icon.style.display = 'inline-block';
        }
    }

    window.onload = fetchNews;
</script>

</body>
</html>
