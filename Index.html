<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <title>キーワード実行ツール</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    input[type="text"] { width: 300px; padding: 8px; margin-bottom: 10px; }
    button { padding: 10px 15px; cursor: pointer; margin-right: 10px; }
    #output, #analysis-output { 
      margin-top: 20px; 
      padding: 10px; 
      border: 1px solid #ccc; 
      background: #f9f9f9; 
      min-height: 50px;
    }
    .loading { color: #888; }
    /* ローディングスピナーのスタイル */
    .spinner {
      border: 4px solid rgba(0, 0, 0, .1);
      border-left-color: #09f;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      animation: spin 1s linear infinite;
      display: none; /* 初期状態では非表示 */
      vertical-align: middle; /* テキストと中央揃え */
      margin-left: 10px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* 無効化されたボタンのスタイル */
    button:disabled {
      background-color: #cccccc;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <h2>RSS 処理ツール</h2>

  <label for="keyword">キーワード:</label><br>
  <input type="text" id="keyword" name="keyword" placeholder="検索キーワードを入力してください"><br><br>

  <button id="runButton" onclick="runDigestJob()">ダイジェスト実行</button>
  <button id="runAnalysisButton" onclick="runAnalysisJob()">分析実行</button>
  <div id="loadingSpinner" class="spinner"></div>

  <h3>ダイジェスト実行結果</h3>
  <div id="output">待機中</div>
  
  <h3>分析実行結果</h3>
  <div id="analysis-output">待機中</div>

  <script>
    function disableButtons(disabled) {
      document.getElementById('runButton').disabled = disabled;
      document.getElementById('runAnalysisButton').disabled = disabled;
      document.getElementById('loadingSpinner').style.display = disabled ? 'inline-block' : 'none';
    }

    function runDigestJob() {
      const keyword = document.getElementById('keyword').value;
      const output = document.getElementById('output');

      if (!keyword.trim()) {
        output.innerHTML = 'キーワードを入力してください。';
        return;
      }

      output.innerHTML = '<span class="loading">実行中...</span>';
      disableButtons(true);

      google.script.run
        .withSuccessHandler(function(result) {
          output.innerHTML = result || '<div>該当記事がありませんでした。</div>';
          disableButtons(false);
        })
        .withFailureHandler(function(error) {
          const msg = (error && error.message) ? error.message : String(error);
          output.innerHTML = '<strong>エラー:</strong><br>' + msg;
          disableButtons(false);
        })
        .executeWeeklyDigest(keyword);
    }
    
    function runAnalysisJob() {
      const keyword = document.getElementById('keyword').value;
      const output = document.getElementById('analysis-output');

      if (!keyword.trim()) {
        output.innerHTML = 'キーワードを入力してください。';
        return;
      }

      output.innerHTML = '<span class="loading">分析中...</span>';
      disableButtons(true);

      google.script.run
        .withSuccessHandler(function(result) {
          output.innerHTML = result || '<div>分析結果がありませんでした。</div>';
          disableButtons(false);
        })
        .withFailureHandler(function(error) {
          const msg = (error && error.message) ? error.message : String(error);
          output.innerHTML = '<strong>エラー:</strong><br>' + msg;
          disableButtons(false);
        })
        .searchAndAnalyzeKeyword(keyword);
    }
  </script>
</body>
</html>
