<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <title>キーワード実行ツール</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    input[type="text"] { width: 300px; padding: 8px; margin-bottom: 10px; }
    button { padding: 10px 15px; cursor: pointer; }
    #output { margin-top: 20px; padding: 10px; border: 1px solid #ccc; background: #f9f9f9; }
    .loading { color: #888; }
    /* ローディングスピナーのスタイル */
    .spinner {
      border: 4px solid rgba(0, 0, 0, .1);
      border-left-color: #09f;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      animation: spin 1s linear infinite;
      display: inline-block; /* テキストと並べるため */
      vertical-align: middle; /* テキストと中央揃え */
      margin-left: 10px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* 無効化されたボタンのスタイル */
    button:disabled {
      background-color: #cccccc;
      cursor: not-allowed;
    }

    /* 分析レポート用のスタイル */
    .summary-section {
      background-color: #eef2f5;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 25px;
    }
    .summary-title {
      margin-top: 0;
      color: #34495e;
      font-size: 16px;
      font-weight: bold;
    }
    .section-header {
      border-bottom: 2px solid #3498db;
      padding-bottom: 8px;
      color: #2980b9;
      margin-top: 30px;
    }
    .tech-card {
      margin-bottom: 20px;
      border: 1px solid #ddd;
      padding: 15px;
      border-radius: 5px;
      border-left: 5px solid #3498db;
      background-color: #fff;
    }
    .tech-title {
      margin: 0 0 10px 0;
      color: #2c3e50;
      font-size: 16px;
      font-weight: bold;
    }
    .tech-meta {
      font-size: 14px;
      line-height: 1.6;
    }
    .tech-link {
      margin-top: 10px;
      font-size: 12px;
      text-align: right;
    }
    .tech-link a {
      color: #3498db;
      text-decoration: none;
    }

  </style>
</head>
<body>
  <h2>RSS ダイジェスト実行</h2>

  <label for="keyword">キーワード:</label><br>
  <input type="text" id="keyword" name="keyword" placeholder="検索キーワードを入力してください"><br><br>

  <button id="runButton" onclick="runDigestJob()">実行</button>

  <div id="output">ステータス: 待機中</div>
  <div id="loadingSpinner" class="spinner" style="display: none;"></div>

  <script>
    function runDigestJob() {
      const keyword = document.getElementById('keyword').value;
      const output = document.getElementById('output');
      const runButton = document.getElementById('runButton'); 
      const loadingSpinner = document.getElementById('loadingSpinner'); 

      if (!keyword.trim()) {
        output.innerHTML = 'ステータス: 待機中<br><span style="color:red;">キーワードを入力してください。</span>';
        return;
      }

      // UIを読み込みモードに変更
      output.innerHTML = '<span class="loading">シート内を検索し、AI分析を実行中... (30秒〜1分ほどかかります)</span>';
      runButton.disabled = true; 
      loadingSpinner.style.display = 'inline-block'; 

      // サーバー側の searchAndAnalyzeKeyword を呼び出す
      google.script.run
        .withSuccessHandler(function(result) {
          // 成功時の表示
          output.innerHTML = result; // サーバーから返ってきたHTMLをそのまま表示
          runButton.disabled = false;
          loadingSpinner.style.display = 'none';
        })
        .withFailureHandler(function(error) {
          // エラー時の表示
          const msg = (error && error.message) ? error.message : String(error);
          output.innerHTML = '<span style="color:red;">エラーが発生しました: ' + msg + '</span>';
          runButton.disabled = false; 
          loadingSpinner.style.display = 'none'; 
        })
        .searchAndAnalyzeKeyword(keyword); // ここでバックエンドの関数名を指定
    }
  </script>
</body>
</html>
